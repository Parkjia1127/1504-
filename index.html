<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재난문자 아카이브</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { background: #d9534f; color: white; padding: 15px; border-radius: 5px; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .msg-box { border-bottom: 1px solid #eee; padding: 10px 0; }
        .msg-info { color: #d9534f; font-weight: bold; font-size: 14px; }
        #status { color: #888; font-size: 13px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🚨 재난문자 조회</h1></div>
    <input type="text" id="searchInput" placeholder="지역명을 입력하세요 (예: 서울, 익산)">
    <div id="status">시스템 준비 중...</div>
    <div id="output"></div>
</div>

<script type="text/javascript">
    async function main() {
        let pyodide = await loadPyodide();
        document.getElementById('status').innerText = "데이터 불러오는 중...";

        // 파이썬 코드 실행
        await pyodide.runPythonAsync(`
            import pyodide_http
            import json
            import pandas as pd # 만약의 확장을 위해
            from js import document, window

            pyodide_http.patch_all() # 브라우저 HTTP 요청 제한 완화 시도

            SERVICE_KEY = "FI1NJ611XO5615BJ"
            url = f"https://apis.data.go.kr/1741000/DisasterMsg3/getDisasterMsg1?serviceKey={SERVICE_KEY}&pageNo=1&numOfRows=20&type=json"

            async def fetch_data():
                try:
                    import requests
                    response = requests.get(url, timeout=5)
                    if response.status_code == 200:
                        data = response.json()
                        rows = data['DisasterMsg'][1]['row']
                        return json.dumps(rows)
                    else:
                        return "error_api"
                except Exception as e:
                    return str(e)

            async def run():
                res = await fetch_data()
                window.renderJS(res)
        `);
        
        pyodide.runPython("run()");
    }

    // 결과를 화면에 그리는 자바스크립트 함수
    window.renderJS = (data) => {
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        
        if (data === "error_api") {
            status.innerText = "⚠️ API 키가 아직 활성화되지 않았거나 호출 한도를 초과했습니다.";
            return;
        }
        
        try {
            const rows = JSON.parse(data);
            status.innerText = `최신 문자 ${rows.length}건 확인됨`;
            
            function filterAndShow() {
                const term = document.getElementById('searchInput').value;
                output.innerHTML = "";
                rows.filter(r => r.location_name.includes(term)).forEach(r => {
                    output.innerHTML += \`
                        <div class="msg-box">
                            <div class="msg-info">[\${r.location_name}] \${r.create_date}</div>
                            <div>\${r.msg}</div>
                        </div>\`;
                });
            }
            
            document.getElementById('searchInput').addEventListener('keyup', filterAndShow);
            filterAndShow();
        } catch(e) {
            status.innerText = "⚠️ 데이터 분석 오류: " + data;
        }
    }

    main();
</script>
</body>
</html>
